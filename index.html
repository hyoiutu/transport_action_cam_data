<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Action Cam Data Transporter</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons (SVGベース) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- カスタムタイトルバー (macOS style) -->
  <div class="title-bar">
    <div class="title-bar-drag"></div>
    <div class="title-text">Action Cam Data Transporter</div>
  </div>

  <div class="app-container">
    <!-- サイドバー (コントロールパネル) -->
    <aside class="sidebar">
      <div class="brand">
        <div class="logo-icon">
          <i data-lucide="aperture"></i>
        </div>
        <div>
          <h1>Transporter</h1>
          <p>Action Cam Backup Tool</p>
        </div>
      </div>

      <!-- コピー元選択 -->
      <div class="control-group">
        <label>
          <i data-lucide="folder-input"></i> コピー元フォルダ (Source)
        </label>
        <div class="drop-zone" id="src-drop-zone">
          <i data-lucide="upload-cloud" class="drop-icon"></i>
          <span class="drop-text">フォルダをドラッグ＆ドロップ<br>またはクリックして選択</span>
        </div>
        <div class="path-display" id="src-path-display">選択されていません</div>
      </div>

      <!-- コピー先選択 -->
      <div class="control-group">
        <label>
          <i data-lucide="folder-output"></i> コピー先フォルダ (Destination)
        </label>
        <div class="drop-zone" id="dest-drop-zone">
          <i data-lucide="download-cloud" class="drop-icon"></i>
          <span class="drop-text">フォルダをドラッグ＆ドロップ<br>またはクリックして選択</span>
        </div>
        <div class="path-display" id="dest-path-display">選択されていません</div>
      </div>

      <!-- コピー実行アクション -->
      <div class="action-panel">
        <button id="btn-start-copy" class="btn btn-primary" disabled>
          <i data-lucide="play"></i> コピーを開始する
        </button>
        <button id="btn-cancel-copy" class="btn btn-danger" disabled>
          <i data-lucide="square"></i> キャンセル
        </button>
      </div>

      <!-- 進捗ステータス -->
      <div class="progress-container" id="progress-container">
        <div class="progress-header">
          <span id="progress-status">待機中...</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar-wrapper">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-file" id="progress-file"></div>
      </div>
    </aside>

    <!-- メインコンテンツ (プレビュー & リスト) -->
    <main class="main-content">
      <header class="content-header">
        <div class="tabs">
          <button class="tab-btn active" id="tab-src">
            <i data-lucide="files"></i> コピー元ファイル (<span id="count-src">0</span>)
          </button>
          <button class="tab-btn" id="tab-dest">
            <i data-lucide="archive"></i> コピー先フォルダ内 (<span id="count-dest">0</span>)
          </button>
        </div>
        <div class="quick-info">
          <span id="scan-info">フォルダを選択してください</span>
        </div>
      </header>

      <!-- グリッドビュー -->
      <section class="gallery-container">
        <div class="gallery-grid" id="gallery-grid">
          <!-- 動的にファイルカードを挿入 -->
          <div class="empty-state">
            <i data-lucide="image-off"></i>
            <p>表示するファイルがありません。コピー元フォルダを選択してスキャンしてください。</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- プレビュー用モーダルダイアログ -->
  <div class="modal" id="preview-modal">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modal-close">
        <i data-lucide="x"></i>
      </button>
      <div class="modal-body" id="modal-body">
        <!-- 動的に画像・動画プレイヤーを挿入 -->
      </div>
      <div class="modal-footer">
        <div class="modal-meta-title" id="modal-meta-title">File Name</div>
        <div class="modal-meta-details">
          <span id="modal-meta-date"><i data-lucide="calendar"></i> Date</span>
          <span id="modal-meta-size"><i data-lucide="database"></i> Size</span>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
